<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>解読機配置判別ツール</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>軍需工場</h1>

<div id="mainWrapper">

<div id="map">
    <img src="images/kouzyou.png">

    <div class="antenna" style="top:67.7249984741211px; left:244.79999542236328px" data-id="A"></div>
    <div class="antenna" style="top:194.7249984741211px; left:256.7999954223633px" data-id="B"></div>
    <div class="antenna" style="top:259.7249984741211px; left:176.79999542236328px" data-id="C"></div>
    <div class="antenna" style="top:88.7249984741211px; left:480.7999954223633px" data-id="D"></div>
    <div class="antenna" style="top:171.7249984741211px; left:635.7999954223633px" data-id="E"></div>
    <div class="antenna" style="top:271.7249984741211px; left:670.7999954223633px" data-id="F"></div>
    <div class="antenna" style="top:315.7249984741211px; left:499.7999954223633px" data-id="G"></div>
    <div class="antenna" style="top:409.7249984741211px; left:427.7999954223633px" data-id="H"></div>
    <div class="antenna" style="top:535.7250003814697px; left:88.79999542236328px" data-id="I"></div>
    <div class="antenna" style="top:584.7250003814697px; left:293.7999954223633px" data-id="J"></div>
    <div class="antenna" style="top:633.7250003814697px; left:549.7999954223633px" data-id="K"></div>
    <div class="antenna" style="top:579.7250003814697px; left:596.7999954223633px" data-id="L"></div>
</div>

<div id="sidePanel">

 <div id="description">
        地図上の暗号機をクリックしてください。<br>
        １回クリック：赤＝その場所にある<br>
        ２回クリック：青＝その場所にない<br>
        条件に合う配置だけが下に表示されます。<br>
	下の画像をクリックすると拡大されます。
    </div>

        <h2 id="count">残り5通り</h2>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<div id="result"></div>

<!-- 画像拡大用モーダル -->
<div id="modal">
    <span id="closeBtn">×</span>
    <img id="modalImg">
</div>

<script>

let selected = [];
let excluded = [];

let autoOpened = false;

// 🔥 座標取得用
document.getElementById("map").addEventListener("click", function(e){
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    console.log("top:" + y + "px; left:" + x + "px;");
});

// 5パターン
const patterns = [
    { name:"images/kouzyou1.png", antennas:["A","D","F","H","I","J","K"] },
    { name:"images/kouzyou2.png", antennas:["A","B","F","G","I","J","K"] },
    { name:"images/kouzyou3.png", antennas:["B","D","E","H","I","J","K"] },
    { name:"images/kouzyou4.png", antennas:["A","C","E","G","H","J","L"] },
    { name:"images/kouzyou5.png", antennas:["C","D","F","H","I","J","L"] }
];

// 🔥 アンテナ3状態切替
document.querySelectorAll(".antenna").forEach(el=>{
    el.addEventListener("click",function(e){
        e.stopPropagation();
        const id = this.dataset.id;

        if(selected.includes(id)){
            // 赤 → 青
            selected = selected.filter(s => s !== id);
            excluded.push(id);
            this.classList.remove("active");
            this.classList.add("absent");

        }else if(excluded.includes(id)){
            // 青 → なし
            excluded = excluded.filter(s => s !== id);
            this.classList.remove("absent");

        }else{
            // なし → 赤
            selected.push(id);
            this.classList.add("active");
        }

        updateResult();
    });
});

function updateResult(){
    const filtered = patterns.filter(p =>
        selected.every(s => p.antennas.includes(s)) &&
        excluded.every(x => !p.antennas.includes(x))
    );

    document.getElementById("count").innerText =
        "残り" + filtered.length + "通り";

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";

    filtered.forEach(p=>{
        const img = document.createElement("img");
        img.src = p.name;

        img.addEventListener("click", function(){
            modal.style.display = "flex";
            modalImg.src = this.src;
        });

        resultDiv.appendChild(img);
    });

    // 🔥 1通りになった瞬間だけ開く
    if(filtered.length === 1 && !autoOpened){
        modal.style.display = "flex";
        modalImg.src = filtered[0].name;
        autoOpened = true;
    }

    // 2通り以上に戻ったらリセット
    if(filtered.length !== 1){
        autoOpened = false;
    }
}
// 🔥 モーダル処理
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const closeBtn = document.getElementById("closeBtn");

closeBtn.addEventListener("click", function(){
    modal.style.display = "none";
});

modal.addEventListener("click", function(e){
    if(e.target === modal){
        modal.style.display = "none";
    }
});

// 🔥 リセットボタン
document.getElementById("resetBtn").addEventListener("click", function(){
    selected = [];
    excluded = [];

    document.querySelectorAll(".antenna").forEach(el=>{
        el.classList.remove("active");
        el.classList.remove("absent");
    });

    updateResult();
});

updateResult();

</script>

</body>
</html>
